<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTradeAI | Admin DB Viewer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { padding: 20px; background: var(--navy); color: white; display: block; overflow-y: auto; font-family: var(--font-body); }
        .admin-card { background: rgba(6, 20, 40, .55); padding: 20px; border-radius: var(--r-m); border: 1px solid var(--glass-b); backdrop-filter: var(--blur); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; min-width: 800px; }
        th, td { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; }
        th { background: rgba(0, 212, 160, 0.1); color: var(--green); text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em;}
        tr:hover { background: rgba(255,255,255,0.02); }
        .source-tag { background: rgba(245, 200, 66, 0.1); color: var(--gold); padding: 4px 10px; border-radius: 20px; font-weight: 600; font-size: 11px; display: inline-block; margin: 2px; }
        .table-responsive { overflow-x: auto; width: 100%; border-radius: 12px; }
        .header-actions { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 30px; }
        @media (max-width: 768px) {
            body { padding: 15px; }
            .h2 { font-size: 24px; }
            .header-actions { flex-direction: column; align-items: flex-start; }
            .admin-card { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header-actions">
            <div>
                <h2 class="h2">Database <span class="grad">Admin Panel</span></h2>
                <p class="muted">This directly reads your SQLite database behind the scenes.</p>
            </div>
            <div style="display: flex; gap: 10px; width: 100%; max-width: 400px; justify-content: flex-end;">
                <button onclick="loadData()" class="btn btn-ghost btn-sm" style="background: rgba(255,255,255,0.05);">🔄 Refresh Data</button>
                <button onclick="exportToCSV()" class="btn btn-glow btn-sm" style="background: var(--cyan); color: var(--navy);">📥 Export CSV</button>
            </div>
        </div>
        
        <div class="admin-card">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Country</th>
                            <th>Phone</th>
                            <th>MT5 Account</th>
                            <th>Source</th>
                            <th>Date Registered</th>
                        </tr>
                    </thead>
                    <tbody id="userTable">
                        <tr><td colspan="8" style="text-align:center;">Loading database records...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allUsers = [];

        const API_BASE = 'https://nextradeai-website-production.up.railway.app';
        
        function loadData() {
            const tbody = document.getElementById('userTable');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 30px;">Loading database records...</td></tr>';
            
            fetch(`${API_BASE}/api/admin/data`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('userTable');
                if (data.users && data.users.length > 0) {
                    allUsers = data.users;
                    tbody.innerHTML = data.users.map(u => `
                        <tr>
                            <td>#${u.id}</td>
                            <td style="font-weight: 600;">${u.fullName}</td>
                            <td>${u.email}</td>
                            <td>${u.country}</td>
                            <td>${u.phone}</td>
                            <td style="color: var(--cyan);">${u.mt5Account}</td>
                            <td><span class="source-tag">${u.source}</span></td>
                            <td><span class="muted">${new Date(u.created_at).toLocaleString()}</span></td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 30px;">No users in the database yet. Go submit the form!</td></tr>';
                }
            })
            .catch(err => {
                document.getElementById('userTable').innerHTML = '<tr><td colspan="8" style="text-align:center; color:#ff6b6b; padding: 30px;">Error connecting to the Node.js server. Please make sure node server.js is running.</td></tr>';
            });
        }

        // Initial load
        loadData();

        function exportToCSV() {
            if (allUsers.length === 0) {
                alert("No data to export!");
                return;
            }

            const header = ["ID", "Full Name", "Email", "Country", "Phone", "MT5 Account", "Source", "Date Registered"];
            const rows = allUsers.map(u => [
                u.id, 
                u.fullName.replace(/"/g, '""'), 
                u.email.replace(/"/g, '""'), 
                u.country.replace(/"/g, '""'), 
                u.phone.replace(/"/g, '""'), 
                u.mt5Account.replace(/"/g, '""'), 
                u.source.replace(/"/g, '""'), 
                new Date(u.created_at).toLocaleString()
            ]);

            let csvContent = "\uFEFF" // UTF-8 BOM
                + header.map(h => `"${h}"`).join(",") + "\n"
                + rows.map(r => r.map(cell => `"${cell}"`).join(",")).join("\n");

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `nextradeai_leads_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
