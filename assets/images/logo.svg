<svg width="350" height="100" viewBox="0 0 350 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Unique AI Branding: The Cyber-Shield Bull -->
  <defs>
    <linearGradient id="main-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4a0" />
      <stop offset="100%" style="stop-color:#3db8fc" />
    </linearGradient>
    
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <mask id="scan-mask">
      <rect x="0" y="0" width="100%" height="100%" fill="white" />
      <rect x="-100" y="0" width="100" height="100" fill="black">
        <animate attributeName="x" from="-100" to="350" dur="4s" repeatCount="indefinite" />
      </rect>
    </mask>
  </defs>

  <!-- The Unique Icon: A futuristic bull skull/shield fusion -->
  <g transform="translate(15, 10)" filter="url(#neon-glow)">
    <!-- Geometric Bull Horns formed by trading spikes -->
    <path d="M10 20 L35 45 L42 38 L55 55 L75 35" fill="none" stroke="url(#main-grad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Outer Cyber Shield Frame -->
    <path d="M42.5 5 L75 20 L75 60 Q75 75 42.5 85 Q10 75 10 60 L10 20 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
    
    <!-- Central AI Core Node -->
    <circle cx="42.5" cy="45" r="5" fill="url(#main-grad)">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Branded Typography -->
  <g transform="translate(100, 52)">
    <!-- Main Logo Text with stylized 'X' and 'A' -->
    <text font-family="'Clash Display', sans-serif" font-weight="800" font-size="38" fill="white" style="letter-spacing: -1px;">
      N<tspan fill="#00d4a0">e</tspan>xTrade<tspan fill="#3db8fc">AI</tspan>
    </text>
    
    <!-- Professional Tagline -->
    <text y="24" font-family="'Cabinet Grotesk', sans-serif" font-weight="600" font-size="11" fill="rgba(255,255,255,0.45)" style="letter-spacing: 4.5px; text-transform: uppercase;">Pro Algorithm Engine</text>
  </g>
  
  <!-- Subtle Micro-Animation Layer -->
  <rect x="100" y="20" width="230" height="60" fill="white" opacity="0.03" mask="url(#scan-mask)" />
</svg>
